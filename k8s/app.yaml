apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/uploads"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  S3_BUCKET: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-tp-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-tp-cloud
  template:
    metadata:
      labels:
        app: mon-tp-cloud
    spec:
      containers:
        - name: app
          image: mon-tp-cloud:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secret

          # Désactive liveness+readiness le temps que l'app démarre.
          startupProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            failureThreshold: 10
            periodSeconds: 5

          # Retire le pod du LB si la DB est injoignable.
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3

          # Redémarre le container si le process est mort.
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mon-tp-cloud
spec:
  type: NodePort
  selector:
    app: mon-tp-cloud
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
