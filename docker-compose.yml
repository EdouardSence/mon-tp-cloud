# Local microservices stack. Browser hits frontend on :8080; the frontend's
# config.js points the browser at the host-mapped backend ports (CORS handles
# cross-origin). task-service talks to auth-service over the internal network.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build: ./services/auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
    ports: ["8081:8080"]
    depends_on:
      postgres: { condition: service_healthy }

  task-service:
    build: ./services/task-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
      AUTH_SERVICE_URL: http://auth-service:8080
      S3_BUCKET: ${S3_BUCKET:-ynov-s3-bucket-esence-904639295906-eu-west-1-an}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports: ["8082:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      auth-service: { condition: service_started }

  frontend:
    build: ./services/frontend
    environment:
      TASK_API_URL: http://localhost:8082
      AUTH_API_URL: http://localhost:8081
    ports: ["8080:80"]
    depends_on:
      - task-service
      - auth-service
