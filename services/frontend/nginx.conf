server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight endpoint for the Cloud Run startup/readiness probe.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
