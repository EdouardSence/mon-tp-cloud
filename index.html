<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 28px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }

    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: #374151; }

    label { display: block; font-size: 0.8125rem; font-weight: 500; color: #6b7280; margin-bottom: 4px; }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 64px; }

    .form-row { margin-bottom: 12px; }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px dashed #d1d5db;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      color: #6b7280;
      width: 100%;
      transition: border-color .15s, background .15s;
    }
    .file-label:hover { border-color: #6366f1; background: #f5f3ff; color: #6366f1; }
    input[type="file"] { display: none; }
    #file-name { font-size: 0.8125rem; color: #6366f1; margin-top: 4px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-sm { padding: 5px 11px; font-size: 0.8125rem; }
    .btn-ghost { background: transparent; border: 1px solid #e5e7eb; color: #374151; }
    .btn-danger { background: #fee2e2; color: #dc2626; }

    #form-error { color: #dc2626; font-size: 0.8125rem; margin-top: 8px; display: none; }

    /* Todo list */
    #todos-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
      border-left: 3px solid #6366f1;
      transition: opacity .2s;
    }
    .todo-item.done { border-left-color: #22c55e; opacity: .7; }

    .todo-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: background .15s, border-color .15s;
    }
    .todo-item.done .todo-check { background: #22c55e; border-color: #22c55e; color: #fff; }

    .todo-body { flex: 1; min-width: 0; }
    .todo-title {
      font-weight: 600;
      font-size: 0.9375rem;
      line-height: 1.3;
    }
    .todo-item.done .todo-title { text-decoration: line-through; color: #9ca3af; }
    .todo-desc { font-size: 0.8125rem; color: #6b7280; margin-top: 2px; }
    .todo-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .todo-date { font-size: 0.75rem; color: #9ca3af; }
    .todo-file { font-size: 0.75rem; color: #6366f1; text-decoration: none; }
    .todo-file:hover { text-decoration: underline; }
    .badge {
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-done { background: #dcfce7; color: #166534; }

    .todo-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .empty { text-align: center; color: #9ca3af; padding: 32px 0; font-size: 0.9375rem; }

    .loading { text-align: center; color: #9ca3af; padding: 24px; }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .list-header h2 { font-size: 1rem; font-weight: 600; color: #374151; margin: 0; }
    #todo-count { font-size: 0.8125rem; color: #6b7280; }
  </style>
</head>
<body>
<div class="container">
  <h1>Todo List</h1>
  <p class="subtitle" id="env-label">Chargement...</p>

  <div class="card">
    <h2>Nouvelle tâche</h2>
    <form id="todo-form">
      <div class="form-row">
        <label for="title">Titre *</label>
        <input type="text" id="title" placeholder="Ex: Déployer l'application" required>
      </div>
      <div class="form-row">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Détails optionnels..."></textarea>
      </div>
      <div class="form-row">
        <label>Pièce jointe (optionnel)</label>
        <label class="file-label" for="file-input">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          Choisir un fichier
        </label>
        <input type="file" id="file-input">
        <div id="file-name"></div>
      </div>
      <p id="form-error"></p>
      <button type="submit" class="btn btn-primary">Ajouter la tâche</button>
    </form>
  </div>

  <div>
    <div class="list-header">
      <h2>Tâches</h2>
      <span id="todo-count"></span>
    </div>
    <div id="todos-list"><div class="loading">Chargement...</div></div>
  </div>
</div>

<script>
  const API = "";

  async function fetchEnv() {
    try {
      const r = await fetch(`${API}/api`);
      const d = await r.json();
      document.getElementById("env-label").textContent = d.message || d.service;
    } catch { document.getElementById("env-label").textContent = ""; }
  }

  async function loadTodos() {
    const list = document.getElementById("todos-list");
    try {
      const r = await fetch(`${API}/todos`);
      const todos = await r.json();
      document.getElementById("todo-count").textContent = `${todos.length} tâche${todos.length !== 1 ? "s" : ""}`;
      if (!todos.length) {
        list.innerHTML = '<p class="empty">Aucune tâche pour l\'instant. Ajoutez-en une !</p>';
        return;
      }
      list.innerHTML = todos.map(t => `
        <div class="todo-item ${t.status === "done" ? "done" : ""}" data-id="${t.id}">
          <div class="todo-check" onclick="toggleStatus(${t.id}, '${t.status}')">
            ${t.status === "done" ? "✓" : ""}
          </div>
          <div class="todo-body">
            <div class="todo-title">${escHtml(t.title)}</div>
            ${t.description ? `<div class="todo-desc">${escHtml(t.description)}</div>` : ""}
            <div class="todo-meta">
              <span class="badge badge-${t.status}">${t.status === "done" ? "Fait" : "En cours"}</span>
              <span class="todo-date">${new Date(t.created_at).toLocaleString("fr-FR")}</span>
              ${t.file_url ? `<a class="todo-file" href="${t.file_url}" target="_blank">📎 Pièce jointe</a>` : ""}
            </div>
          </div>
          <div class="todo-actions">
            <button class="btn btn-sm btn-danger" onclick="deleteTodo(${t.id})">✕</button>
          </div>
        </div>`).join("");
    } catch (e) {
      list.innerHTML = `<p class="empty">Erreur: ${e.message}</p>`;
    }
  }

  async function toggleStatus(id, current) {
    const next = current === "done" ? "pending" : "done";
    await fetch(`${API}/todos/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: next }),
    });
    loadTodos();
  }

  async function deleteTodo(id) {
    await fetch(`${API}/todos/${id}`, { method: "DELETE" });
    loadTodos();
  }

  document.getElementById("file-input").addEventListener("change", function () {
    document.getElementById("file-name").textContent = this.files[0]?.name || "";
  });

  document.getElementById("todo-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("form-error");
    errEl.style.display = "none";

    const fd = new FormData();
    fd.append("title", document.getElementById("title").value.trim());
    fd.append("description", document.getElementById("description").value.trim());
    const file = document.getElementById("file-input").files[0];
    if (file) fd.append("file", file);

    try {
      const r = await fetch(`${API}/todos`, { method: "POST", body: fd });
      if (!r.ok) {
        const d = await r.json();
        errEl.textContent = d.error || `Erreur ${r.status}`;
        errEl.style.display = "block";
        return;
      }
      e.target.reset();
      document.getElementById("file-name").textContent = "";
      loadTodos();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = "block";
    }
  });

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  fetchEnv();
  loadTodos();
</script>
</body>
</html>
