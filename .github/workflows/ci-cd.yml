name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PROJECT_ID: mon-tp-cloud
  REGION: europe-west1
  GAR: europe-west1-docker.pkg.dev/mon-tp-cloud/docker

jobs:
  # ─── CI: lint + test run in parallel (no needs: between them) ──────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.9
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, task-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest==8.3.4
      - name: Unit tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          S3_BUCKET: "test-bucket"
        run: pytest -q

  # ─── CD: build + push the 3 images independently to Artifact Registry ──────
  # Gated on lint AND test. Skipped on pull_request (no GCP creds in forks).
  build-and-push:
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: frontend, context: services/frontend }
          - { name: auth-service, context: services/auth-service }
          - { name: task-service, context: services/task-service }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build & push ${{ matrix.name }}
        run: |
          IMG="${{ env.GAR }}/${{ matrix.name }}"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" ${{ matrix.context }}
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

  # ─── CD: deploy dev (develop) / prod (main) via Terraform ─────────────────
  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (dev)
        working-directory: terraform/environments/dev
        env:
          TF_VAR_frontend_image: "${{ env.GAR }}/frontend:${{ github.sha }}"
          TF_VAR_auth_image: "${{ env.GAR }}/auth-service:${{ github.sha }}"
          TF_VAR_task_image: "${{ env.GAR }}/task-service:${{ github.sha }}"
          TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

  deploy-prod:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (prod)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_frontend_image: "${{ env.GAR }}/frontend:${{ github.sha }}"
          TF_VAR_auth_image: "${{ env.GAR }}/auth-service:${{ github.sha }}"
          TF_VAR_task_image: "${{ env.GAR }}/task-service:${{ github.sha }}"
          TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false
