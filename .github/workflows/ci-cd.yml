name: CI/CD

# CI runs on every push and PR. CD (build/push/deploy) runs only on pushes to
# develop (-> dev env) and main (-> prod env), and only after CI passes.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── CI ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest # fresh, isolated VM per job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.9
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Unit tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          S3_BUCKET: "test-bucket"
        run: pytest -q

  # ─── CD: build + push ──────────────────────────────────────────────────────
  # Gated on lint AND test via `needs`. Skipped entirely on pull_request.
  build-and-push:
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GitHub Container Registry
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image base
        id: img
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}-backend:${{ github.sha }}
            ${{ steps.img.outputs.base }}-backend:latest
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.img.outputs.base }}-frontend:${{ github.sha }}
            ${{ steps.img.outputs.base }}-frontend:latest

  # ─── CD: deploy ──────────────────────────────────────────────────────────
  # Terraform applies against the minikube cluster, so these jobs must run on a
  # self-hosted runner that has kubeconfig access to it. The `environment:` keys
  # give you per-env protection rules (e.g. required reviewers on prod) and an
  # auditable deployment history — the "traçable" gate before prod ships.
  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: [self-hosted]
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Compute lowercase image base
        id: img
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Terraform apply (dev)
        working-directory: terraform/environments/dev
        env:
          TF_VAR_backend_image: "${{ steps.img.outputs.base }}-backend:${{ github.sha }}"
          TF_VAR_frontend_image: "${{ steps.img.outputs.base }}-frontend:${{ github.sha }}"
          TF_VAR_image_pull_policy: "IfNotPresent"
          TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

  deploy-prod:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted]
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Compute lowercase image base
        id: img
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Terraform apply (prod)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_backend_image: "${{ steps.img.outputs.base }}-backend:${{ github.sha }}"
          TF_VAR_frontend_image: "${{ steps.img.outputs.base }}-frontend:${{ github.sha }}"
          TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false
